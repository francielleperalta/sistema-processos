<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Gestão de Processos</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #005ea2;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      background: #005ea2;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.95;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn-row button,
    .btn-row input {
      flex: 1;
      min-width: 180px;
    }

    .logout-btn {
      background: #b42318;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #005ea2;
      color: white;
      text-align: left;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      vertical-align: top;
      font-size: 14px;
    }

    td[contenteditable="true"] {
      background: #fff8dc;
    }

    .acoes button {
      width: auto;
      padding: 6px 10px;
      margin: 0;
      background: #b42318;
      border-radius: 4px;
    }

    canvas {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }

    .status {
      margin-top: 10px;
      color: #444;
      font-size: 14px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <header>🏛️ Sistema de Gestão de Processos</header>

  <!-- LOGIN -->
  <div id="loginBox" class="container">
    <div class="card">
      <h3>Login</h3>
      <input type="email" id="email" placeholder="E-mail" />
      <input type="password" id="senha" placeholder="Senha" />
      <button onclick="login()">Entrar</button>
      <div class="status" id="statusLogin"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="appBox" class="container hidden">
    <div class="card">
      <div class="topbar">
        <h3 style="margin:0;">Painel de Processos</h3>
        <button class="logout-btn" style="max-width:180px;" onclick="logout()">Sair</button>
      </div>

      <textarea id="entrada" placeholder="Cole o texto do processo aqui..."></textarea>

      <div class="btn-row">
        <button onclick="gerarTabela()">Gerar Processo</button>
        <input id="busca" placeholder="🔎 Buscar..." onkeyup="filtrar()" />
      </div>

      <div class="btn-row">
        <button onclick="exportarExcel()">Exportar Excel</button>
        <button onclick="exportarPDF()">Exportar PDF</button>
      </div>

      <div class="small">
        Dica: após editar qualquer célula da tabela, clique fora dela para salvar automaticamente no banco.
      </div>
    </div>

    <div class="card">
      <table id="tabela" class="hidden">
        <thead>
          <tr>
            <th>Processo</th>
            <th>Interessado</th>
            <th>Assunto</th>
            <th>Data</th>
            <th>Situação</th>
            <th>Prazo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <canvas id="grafico"></canvas>
    </div>
  </div>
